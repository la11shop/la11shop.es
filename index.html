<head>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --neon: #adff2f;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        .navbar {
            background-color: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid var(--neon);
            padding: 1rem 2rem;
        }
        .navbar-brand { font-weight: 900; color: var(--neon) !important; letter-spacing: 2px; }
        .nav-link { color: white !important; font-weight: 600; transition: 0.3s; }
        .nav-link:hover { color: var(--neon) !important; }

        .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.5) !important;
        }

        .navbar-toggler-icon {
            filter: invert(1); /* Esto voltea el color negro a blanco automáticamente */
        }

        /* --- Hero Carousel --- */
        .carousel-item {
            height: 60vh;
            background-color: #000;
        }
        .carousel-img-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--dark));
            z-index: 1;
        }
        .carousel-caption { z-index: 2; bottom: 20%; }
        .carousel-caption h2 { font-weight: 900; font-size: 3rem; text-transform: uppercase; }

        /* --- Category Cards --- */
        .section-title {
            text-align: center;
            margin: 4rem 0;
            font-weight: 900;
            text-transform: uppercase;
            border-left: 5px solid var(--neon);
            padding-left: 15px;
            display: inline-block;
        }

        .category-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: var(--gray);
            border: 1px solid #333;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            height: 400px;
        }

        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: grayscale(30%);
        }

        .category-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 2rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            text-align: center;
        }

        /* --- EFECTOS HOVER (Interacción) --- */
        .category-card:hover {
            transform: translateY(-15px);
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(173, 255, 47, 0.3);
        }

        .category-card:hover img {
            transform: scale(1.15);
            filter: grayscale(0%);
        }

        .btn-custom {
            background-color: var(--neon);
            color: black;
            font-weight: 800;
            border-radius: 50px;
            padding: 10px 30px;
            text-transform: uppercase;
            transition: 0.3s;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-custom:hover {
            background-color: white;
            box-shadow: 0 0 20px var(--neon);
            transform: scale(1.05);
        }

        footer {
            padding: 3rem 0;
            border-top: 1px solid #333;
            margin-top: 5rem;
            text-align: center;
            color: #666;
        }
        .insta-link {
        color: white; /* Color normal del icono */
        transition: 0.3s;
        text-decoration: none;
    }

    .insta-link:hover {
        color: #adff2f; /* Cambia al verde neón al pasar el ratón */
        transform: scale(1.2); /* Crece un poquito */
        display: inline-block;
    }
    </style>
</head>
