    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
 :root { --neon: #adff2f; --dark: #0a0a0a; }
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding-bottom: 50px;
        }

        .container { padding-top: 80px; }
        .back-link { color: var(--neon); text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 40px; transition: 0.3s; }
        .back-link:hover { color: white; transform: translateX(-5px); }

        .navbar {
            background-color: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid var(--neon);
            padding: 1rem 2rem;
        }
        .navbar-brand { font-weight: 900; color: var(--neon) !important; letter-spacing: 2px; }
        .nav-link { color: white !important; font-weight: 600; transition: 0.3s; }
        .nav-link:hover { color: var(--neon) !important; }

        .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.5) !important;
        }

        .navbar-toggler-icon {
            filter: invert(1); /* Esto voltea el color negro a blanco automáticamente */
        }

        /* Tarjeta de Selección con Imagen de Fondo */
        .selection-card { 
            position: relative;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: 0.5s ease;
        }

        /* La imagen de fondo */
        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) grayscale(50%); /* Oscurecemos la imagen para leer el texto */
            transition: 0.6s ease;
            z-index: 1;
        }

        /* El contenido (texto) */
        .card-content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .selection-card h2 { font-weight: 900; font-size: 2.5rem; text-transform: uppercase; margin: 0; }
        .selection-card p { color: var(--neon); font-weight: bold; letter-spacing: 1px; }

        /* Efecto HOVER (Interacción) */
        .selection-card:hover {
            border-color: var(--neon);
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(173, 255, 47, 0.2);
        }

        .selection-card:hover .card-bg {
            filter: brightness(0.6) grayscale(0%); /* Se aclara y recupera color al pasar el ratón */
            transform: scale(1.1);
        }

        .number-badge {
            background: var(--neon);
            color: black;
            font-weight: 900;
            padding: 5px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            display: inline-block;
        }  
    </style>
</head>
